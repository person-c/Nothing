<header>
    <nav class="nav-container">
        <div class="nav-bar" tabindex="0" role="button" aria-label="Toggle navigation menu"></div>
        <ul class="nav-menu">
            <li><a href="{{ "/" | relURL }}">Home</a></li>
            <li><a href="{{ "/about/" | relURL }}">About</a></li>
            <li><a href="{{ "/daily_work/" | relURL }}">Daily-Work</a></li>
            <li><a href="{{ "/note/" | relURL }}">Note</a></li>
            <li><a href="{{ "/slides/" | relURL }}">Slides</a></li>
            {{ if not hugo.IsProduction }}
            <li><a href="{{ "/daily_life/" | relURL }}">Daily-Life</a></li>
            {{ end }}
        </ul>
    </nav>
    <script>
    document.querySelector('.nav-bar').addEventListener('click', function(e) {
        e.stopPropagation();
        document.querySelector('.nav-container').classList.toggle('is-open');
    });
    document.addEventListener('click', function() {
        document.querySelector('.nav-container').classList.remove('is-open');
    });
    </script>
</header>
