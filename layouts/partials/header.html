<header>
    <div class="header-controls">
        <button class="theme-toggle" aria-label="Toggle color theme" title="Toggle color theme">☀</button>
        <nav class="nav-container">
            <div class="nav-bar" tabindex="0" role="button" aria-label="Toggle navigation menu"></div>
            <ul class="nav-menu">
                <li><a href="{{ "/" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>Home</a></li>
                <li><a href="{{ "/about/" | relURL }}"{{ if eq .Section "about" }} class="active"{{ end }}>About</a></li>
                <li><a href="{{ "/daily_work/" | relURL }}"{{ if eq .Section "daily_work" }} class="active"{{ end }}>Daily-Work</a></li>
                <li><a href="{{ "/note/" | relURL }}"{{ if eq .Section "note" }} class="active"{{ end }}>Note</a></li>
                <li><a href="{{ "/slides/" | relURL }}"{{ if eq .Section "slides" }} class="active"{{ end }}>Slides</a></li>
                {{ if not hugo.IsProduction }}
                <li><a href="{{ "/daily_life/" | relURL }}"{{ if eq .Section "daily_life" }} class="active"{{ end }}>Daily-Life</a></li>
                {{ end }}
            </ul>
        </nav>
    </div>
    <script>
    document.querySelector('.nav-bar').addEventListener('click', function(e) {
        e.stopPropagation();
        document.querySelector('.nav-container').classList.toggle('is-open');
    });
    document.addEventListener('click', function() {
        document.querySelector('.nav-container').classList.remove('is-open');
    });
    </script>
</header>
