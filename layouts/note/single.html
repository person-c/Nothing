<!DOCTYPE html>
<html lang="{{ .Lang | default .Site.Language.Lang | default "en" }}">

{{ partial "head.html" . }}

<body>
    <a href="#main-content" class="skip-to-content">Skip to content</a>
    {{ partial "header.html" . }}

    <main id="main-content">
        <div class="layout">
            <article>
                {{ .Content }}
            </article>
        </div>
    </main>

    {{ partial "footer.html" . }}

    <script>
    document.querySelector('.back-to-top')?.addEventListener('click', function(e) {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    </script>
</body>
</html>
