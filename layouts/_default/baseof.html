<!DOCTYPE html>
<html lang="{{ .Lang | default .Site.Language.Lang | default "en" }}">

{{ partial "head.html" . }}

<body{{ block "body_attrs" . }}{{ end }}>
    {{ block "body_content" . }}
    <a href="#main-content" class="skip-to-content">Skip to content</a>
    {{ partial "header.html" . }}

    <main id="main-content">
        {{ block "main" . }}{{ end }}
    </main>

    {{ block "footer" . }}
    {{ partial "footer.html" . }}
    {{ end }}
    {{ end }}

    {{ block "scripts" . }}{{ end }}
</body>

</html>
