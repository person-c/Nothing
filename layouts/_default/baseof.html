<!DOCTYPE html>
<html lang="{{ .Lang | default .Site.Language.Lang | default "en" }}">

{{ partial "head.html" . }}

<body>
    <a href="#main-content" class="skip-to-content">Skip to content</a>
    {{ partial "header.html" . }}

    <main id="main-content">
        {{ block "main" . }}{{ end }}
    </main>

    {{ block "scripts" . }}{{ end }}
</body>

</html>
